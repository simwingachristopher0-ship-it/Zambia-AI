<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zambia AI</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
  body { background: linear-gradient(to bottom, #ff8c00, #fff); min-height: 100vh; }
  header { background: #0a8f4f; color: white; text-align: center; padding: 15px; }
  header h1 { font-size: 22px; }
  header p { font-size: 12px; opacity: 0.9; }
 .chat { max-width: 700px; margin: 20px auto; background: white; border-radius: 15px; padding: 20px; min-height: 65vh; }
 .msg { margin-bottom: 15px; }
 .user { text-align: right; }
 .user.bubble { background: #0a8f4f; color: white; display: inline-block; padding: 12px 16px; border-radius: 18px; }
 .ai.bubble { background: #f1f1f1; color: #000; display: inline-block; padding: 12px 16px; border-radius: 18px; }
 .input { display: flex; gap: 10px; max-width: 700px; margin: 0 auto 20px auto; padding: 0 10px; }
  #input-box { flex: 1; padding: 14px 20px; border: 1px solid #ddd; border-radius: 25px; outline: none; }
  #send { background: #0a8f4f; color: white; border: none; padding: 14px 25px; border-radius: 25px; font-weight: bold; }
</style>
</head>
<body>

<header>
  <h1>🇿🇲 ZAMBIA AI</h1>
  <p>Your AI Assistant from Zambia | Powered by Groq</p>
</header>

<div class="chat" id="chat">
  <div class="msg ai"><div class="bubble">Hello Christopher! Ask me anything.</div></div>
</div>

<div class="input">
  <input type="text" id="input-box" placeholder="Ask Zambia AI...">
  <button id="send">Send</button>
</div>

<script>
const API = "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";
const chat = document.getElementById('chat');

function add(who, txt){
  chat.innerHTML += `<div class="msg ${who}"><div class="bubble">${txt}</div></div>`;
  chat.scrollTop = chat.scrollHeight;
}

async function ask(t){
  if(!t) return;
  add('user', t);
  document.getElementById('input-box').value = "";

  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {"Authorization": "Bearer " + API, "Content-Type": "application/json"},
    body: JSON.stringify({
      model: "llama-3.1-8b-instant",
      messages: [{role: "user", content: t}]
    })
  });
  const data = await res.json();
  add('ai', data.choices[0].message.content);
}

document.getElementById('send').onclick = () => ask(document.getElementById('input-box').value);
</script>
</body>
</html>
