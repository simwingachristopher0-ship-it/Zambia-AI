<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zambia AI Super App</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
  body { background: #000; color: #e3e3e3; height: 100vh; display: flex; flex-direction: column; }

.tools { display: flex; gap: 10px; padding: 12px; overflow-x: auto; background: #000; }
.tool-btn { background: #1e1e1e; color: #e3e3e3; border: 1px solid #333; padding: 10px 18px; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 14px; }
.tool-btn:hover { background: #2d2d2d; }

  #chat-box { flex: 1; overflow-y: auto; padding: 20px; }
.msg { display: flex; gap: 12px; margin-bottom: 20px; max-width: 800px; margin: 0 auto 20px auto; }
.avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; flex-shrink: 0; }
.user.avatar { background: #0a8f4f; color: white; }
.ai.avatar { background: #0a8f4f; color: white; }
.bubble { flex: 1; line-height: 1.6; font-size: 15px; background: #1a1a1a; padding: 16px; border-radius: 12px; white-space: pre-wrap; }

.input-area { padding: 16px; border-top: 1px solid #222; }
.input-wrap { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; background: #1a1a1a; border-radius: 30px; padding: 8px 8px 8px 20px; align-items: center; }
  #input-box { flex: 1; background: transparent; border: none; color: #e3e3e3; font-size: 15px; outline: none; }
.mic-btn { background: #0a8f4f; color: white; border: none; border-radius: 24px; padding: 10px 18px; font-weight: bold; cursor: pointer; }
  #send-btn { background: #0a8f4f; color: white; border: none; border-radius: 24px; padding: 10px 20px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>

<div class="tools">
  <button class="tool-btn" onclick="sendQuick('Chat')">Chat</button>
  <button class="tool-btn" onclick="sendQuick('Create slides about')">Slides</button>
  <button class="tool-btn" onclick="sendQuick('Write me a song about')">Song</button>
  <button class="tool-btn" onclick="sendQuick('Create google sheet for')">Google Sheet</button>
  <button class="tool-btn" onclick="sendQuick('Help with construction')">Construction</button>
  <button class="tool-btn" onclick="sendQuick('Farming advice')">Farming</button>
  <button class="tool-btn" onclick="sendQuick('Business idea')">Business</button>
</div>

<div id="chat-box">
  <div class="msg ai">
    <div class="avatar">Z</div>
    <div class="bubble">Hello Christopher! I am Zambia AI Super App. I can do: Chat, Slides, Songs, Sheets, Construction, Farming, Business, Teaching, Government, Banking, Images, Videos, News. Pick a tool above or just talk to me. You can also use voice.</div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <input type="text" id="input-box" placeholder="Ask anything... or use voice">
    <button class="mic-btn" id="mic-btn">Mic</button>
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
const GROQ_API_KEY = "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";

const chatBox = document.getElementById('chat-box');
const inputBox = document.getElementById('input-box');
const sendBtn = document.getElementById('send-btn');
const micBtn = document.getElementById('mic-btn');

function addMessage(sender, text) {
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg ' + (sender === 'You'? 'user' : 'ai');
    msgDiv.innerHTML = '<div class="avatar">' + (sender === 'You'? 'C' : 'Z') + '</div><div class="bubble">' + text + '</div>';
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendQuick(topic) {
    inputBox.value = topic;
    askGroq(topic);
}

// VOICE
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SpeechRecognition){
  const rec = new SpeechRecognition();
  micBtn.onclick = () => rec.start();
  rec.onresult = (e) => { inputBox.value = e.results[0][0].transcript; askGroq(inputBox.value); }
}

async function askGroq(userText) {
    if(userText.trim() === "") return;
    sendBtn.disabled = true;
    addMessage('You', userText);
    inputBox.value = "";

    try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: { "Authorization": "Bearer " + GROQ_API_KEY, "Content-Type": "application/json" },
            body: JSON.stringify({
                model: "llama-3.1-70b-versatile",
                messages: [
                    {role: "system", content: "You are Zambia AI Super App for Christopher. Help with Chat, Slides, Songs, Sheets, Construction, Farming, Business and anything else. Be helpful and detailed."},
                    {role: "user", content: userText}
                ]
            })
        });
        const data = await response.json();
        addMessage('AI', data.choices[0].message.content);
    } catch (error) {
        addMessage('AI', "Sorry, I couldn't get a response. Please try again.");
    }
    sendBtn.disabled = false;
}

sendBtn.addEventListener('click', () => {
    if(inputBox.value.trim()!== "") askGroq(inputBox.value);
});
inputBox.addEventListener("keypress", (e) => { if (e.key === "Enter") sendBtn.click(); });
</script>
</body>
</html>
