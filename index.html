<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zambia AI</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
  body { background: linear-gradient(to bottom, #ff8c00 0%, #ffffff 100%); min-height: 100vh; display: flex; flex-direction: column; }

  header { background: #0a8f4f; color: white; padding: 12px; text-align: center; }
  header.flag { font-size: 28px; }
  header h1 { font-size: 20px; font-weight: bold; margin: 4px 0; }
  header p { font-size: 12px; opacity: 0.9; }

.chat-container { flex: 1; padding: 20px 10px; }
.chat-box { max-width: 700px; margin: 0 auto; background: white; border-radius: 16px; padding: 20px; min-height: 60vh; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.msg { display: flex; margin-bottom: 16px; }
.msg.user { justify-content: flex-end; }
.bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.5; }
.user.bubble { background: #0a8f4f; color: white; border-bottom-right-radius: 4px; }
.ai.bubble { background: #f1f3f4; color: #000; border-bottom-left-radius: 4px; }

.input-area { padding: 16px; background: white; border-top: 1px solid #eee; }
.input-wrap { max-width: 700px; margin: 0 auto; display: flex; gap: 10px; }
  #input-box { flex: 1; border: 1px solid #ddd; border-radius: 24px; padding: 12px 20px; font-size: 15px; outline: none; }
  #send-btn { background: #0a8f4f; color: white; border: none; border-radius: 24px; padding: 12px 24px; font-weight: bold; cursor: pointer; font-size: 15px; }
  #send-btn:active { background: #087a44; }
</style>
</head>
<body>

<header>
  <div class="flag">🇿🇲</div>
  <h1>ZAMBIA AI</h1>
  <p>Your AI Assistant from Zambia | Powered by Groq</p>
</header>

<div class="chat-container">
  <div class="chat-box" id="chat-box">
    <div class="msg ai">
      <div class="bubble">Hello Christopher! Ask me anything.</div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-wrap">
    <input type="text" id="input-box" placeholder="Ask Zambia AI...">
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
const GROQ_API_KEY = "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";

const chatBox = document.getElementById('chat-box');
const inputBox = document.getElementById('input-box');
const sendBtn = document.getElementById('send-btn');

function addMessage(sender, text) {
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg ' + (sender === 'You'? 'user' : 'ai');
    msgDiv.innerHTML = '<div class="bubble">' + text + '</div>';
    chatBox.appendChild(msgDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

async function askGroq(userText) {
    if(userText.trim() === "") return;
    sendBtn.disabled = true;
    addMessage('You', userText);
    inputBox.value = "";

    try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + GROQ_API_KEY,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "llama-3.1-8b-instant",
                messages: [
                    {role: "system", content: "You are Zambia AI for Christopher. Be helpful and answer clearly."},
                    {role: "user", content: userText}
                ],
                temperature: 0.7
            })
        });

        if(!response.ok) throw new Error("API Error");

        const data = await response.json();
        addMessage('AI', data.choices[0].message.content);

    } catch (error) {
        addMessage('AI', "Sorry, I couldn't get a response. Please try again.");
        console.log(error);
    }
    sendBtn.disabled = false;
}

sendBtn.addEventListener('click', () => {
    if(inputBox.value.trim()!== "") askGroq(inputBox.value);
});
inputBox.addEventListener("keypress", (e) => { if (e.key === "Enter") sendBtn.click(); });
</script>
</body>
</html>
